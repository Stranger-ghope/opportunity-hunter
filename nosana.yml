# ─────────────────────────────────────────────
# Nosana Job Definition
# Deploy the Opportunity Hunter on Nosana decentralized GPU network
# ─────────────────────────────────────────────

version: "1"

type: container

meta:
  trigger: api                    # Trigger via Nosana API

ops:
  - id: opportunity-hunter
    type: container/run
    args:
      image: cheeseman07/opportunity-hunter:latest
      gpu: false                  # No GPU needed — LLM inference goes to external Nosana inference API
      expose: 3000                # Expose dashboard port
      env:
        - INFERENCE_PROVIDER=nosana
        - MODEL_NAME=Qwen3.5-27B-AWQ-4bit
        - NOSANA_API_URL=https://6vq2bcqphcansrs9b88ztxfs88oqy7etah2ugudytv2x.node.k8s.prd.nos.ci/v1
        - OPENAI_API_URL=https://6vq2bcqphcansrs9b88ztxfs88oqy7etah2ugudytv2x.node.k8s.prd.nos.ci/v1
        - OPENAI_API_KEY=nosana
        - OPENAI_EMBEDDING_URL=https://4yiccatpyxx773jtewo5ccwhw1s2hezq5pehndb6fcfq.node.k8s.prd.nos.ci/v1
        - OPENAI_EMBEDDING_API_KEY=nosana
        - OPENAI_EMBEDDING_MODEL=Qwen3-Embedding-0.6B
        - OPENAI_EMBEDDING_DIMENSIONS=1024
        - PIPELINE_INTERVAL_MINUTES=60
        - SCORE_THRESHOLD=55
        - DASHBOARD_PORT=3000
        - DATA_DIR=/app/data
        - LOG_LEVEL=info
      # Secrets — set via Nosana job secrets, not plaintext
      secrets:
        - REDDIT_CLIENT_ID
        - REDDIT_CLIENT_SECRET
      resources:
        # Inference runs on Nosana's decentralized GPU endpoints, not this container
        memory: 4096Mi
        cpu: 2
